<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAWP — Resources</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/resource.css">
</head>

<body>

    <nav class="navbar">
        <a class="logo" href="index.html">UAWP</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="resource.html" class="active">Resources</a></li>
            <li><a href="help.html">Help Request</a></li>
            <li><a href="success.html">Success Stories</a></li>
        </ul>
    </nav>

    <section class="resource-hero">
        <div class="hero-eyebrow">
            <i class="fas fa-globe"></i>
            Verified Global Directory
        </div>
        <h1>Find the <em>right support</em>,<br>wherever you are.</h1>
        <p>Hospitals, therapy centres, NGOs & schools — filtered by country, disability type, and category.</p>
    </section>

    <div class="filter-section">
        <div class="filter-row">
            <label>Search</label>
            <div class="search-box">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search by name, city, or disability...">
            </div>
        </div>
        <div class="filter-row">
            <label>Country</label>
            <div class="filter-pills" id="countryFilters">
                <button class="pill active" data-country="all">All Countries</button>
                <button class="pill" data-country="Bangladesh">Bangladesh</button>
                <button class="pill" data-country="India">India</button>
                <button class="pill" data-country="USA">USA</button>
                <button class="pill" data-country="UK">UK</button>
                <button class="pill" data-country="Canada">Canada</button>
                <button class="pill" data-country="Australia">Australia</button>
                <button class="pill" data-country="Germany">Germany</button>
            </div>
        </div>
        <div class="filter-row">
            <label>Disability</label>
            <!-- Pills are built dynamically from the data in resource.js -->
            <div class="filter-pills" id="disabilityFilters">
                <button class="pill active" data-dis="all">All</button>
            </div>
        </div>
        <div class="filter-row">
            <label>Category</label>
            <div class="filter-pills" id="categoryFilters">
                <button class="pill active" data-cat="all">All</button>
                <button class="pill" data-cat="Hospital">Hospital</button>
                <button class="pill" data-cat="NGO">NGO</button>
                <button class="pill" data-cat="Therapy">Therapy</button>
                <button class="pill" data-cat="School">School</button>
                <button class="pill" data-cat="Government">Government</button>
            </div>
        </div>
    </div>

    <div class="results-count"><span id="resultCount"></span></div>

    <section class="resource-container">
        <div class="resource-grid" id="cardGrid"></div>
    </section>

    <!-- MODAL -->
    <div id="resourceModal" class="modal-bg">
        <div class="modal-content">
            <div class="modal-top-strip"></div>
            <div class="modal-inner">
                <span class="close-btn" id="modalClose"><i class="fas fa-xmark"></i></span>
                <div class="modal-header">
                    <div class="modal-icon" id="mIcon"></div>
                    <div class="modal-title">
                        <h2 id="mName"></h2>
                        <div class="modal-badges" id="mBadges"></div>
                    </div>
                </div>
                <div class="modal-body" id="mBody"></div>
            </div>
        </div>
    </div>

    <footer class="footer">© 2026 UAWP — Unified Adaptive Web Platform &nbsp;·&nbsp; InclusionHub</footer>

    <script src="../js/resource.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAWP — Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-text">UAWP</div>
            <div class="logo-sub">Admin Panel</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a class="nav-item active" href="#">
                <i class="fas fa-table-columns"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-item" href="../../web/pages/resource.html">
                <i class="fas fa-folder-open"></i>
                <span>Resources</span>
            </a>
            <a class="nav-item" href="../../web/pages/help.html">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Help Requests</span>
            </a>
            <div class="nav-label">Platform</div>
            <a class="nav-item" href="../../web/pages/index.html">
                <i class="fas fa-arrow-up-right-from-square"></i>
                <span>View Site</span>
            </a>
        </nav>
        <div class="sidebar-footer">© 2026 UAWP</div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-title">
                Help Requests
                <span>Manage & respond to all incoming requests</span>
            </div>
            <div class="topbar-right">
                <button class="refresh-btn" onclick="loadRequests()">
                    <i class="fas fa-rotate-right"></i> Refresh
                </button>
                <div class="admin-badge">
                    <div class="admin-dot"></div>
                    Admin
                </div>
            </div>
        </header>

        <div class="content">

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="stat-icon"><i class="fas fa-inbox"></i></div>
                    <div class="stat-num" id="totalCount">—</div>
                    <div class="stat-label">Total Requests</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-num" id="pendingCount">—</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card reviewed">
                    <div class="stat-icon"><i class="fas fa-eye"></i></div>
                    <div class="stat-num" id="reviewedCount">—</div>
                    <div class="stat-label">Reviewed</div>
                </div>
                <div class="stat-card resolved">
                    <div class="stat-icon"><i class="fas fa-circle-check"></i></div>
                    <div class="stat-num" id="resolvedCount">—</div>
                    <div class="stat-label">Resolved</div>
                </div>
            </div>

            <!-- TABLE CARD -->
            <div class="table-card">
                <div class="table-header">
                    <h2>All Requests</h2>
                    <div class="filter-pills">
                        <button class="pill active" onclick="setFilter('all',this)">All</button>
                        <button class="pill" onclick="setFilter('Pending',this)">Pending</button>
                        <button class="pill" onclick="setFilter('Reviewed',this)">Reviewed</button>
                        <button class="pill" onclick="setFilter('Resolved',this)">Resolved</button>
                    </div>
                </div>
                <div class="search-row">
                    <div class="search-box">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search by name or email..."
                            oninput="renderTable()">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Applicant</th>
                                <th>Help Type</th>
                                <th>Urgency</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Submitted</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="8">
                                    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>
                                        <p>Loading...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-top">
                <div>
                    <div class="modal-name" id="modalName"></div>
                    <div class="modal-date" id="modalDate"></div>
                </div>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="../js/admin.js"></script>
</body>

</html>
